anta.tests.system:
  - VerifyUptime:
      minimum: 600

anta.tests.hardware:
  # Verifies the status of power supply fans and all fan trays.
  - VerifyEnvironmentCooling:
      states:
        - ok

anta.tests.software:
  # Verifies the device is running one of the allowed TerminAttr version.
  - VerifyTerminAttrVersion:
      versions:
        - v1.32.0
        - v1.42.0

anta.tests.routing:
  generic:
    - VerifyRoutingProtocolModel:
        model: multi-agent

  bgp:
    # SPINE
    - VerifyBGPPeerCount:
        address_families:
          - afi: "evpn"
            num_peers: 6
          - afi: "ipv4"
            safi: "unicast"
            vrf: "default"
            num_peers: 6
        filters:
          tags: ["spine"]
    # LEAF
    - VerifyBGPPeerCount:
        address_families:
          - afi: "evpn"
            num_peers: 2
          - afi: "ipv4"
            safi: "unicast"
            vrf: "OVERLAY"
            num_peers: 1
          - afi: "ipv4"
            safi: "unicast"
            vrf: "default"
            num_peers: 3
        filters:
          tags: ["leaf"]
    # BORDER
    - VerifyBGPPeerCount:
        address_families:
          - afi: "evpn"
            num_peers: 2
          - afi: "ipv4"
            safi: "unicast"
            vrf: "OVERLAY"
            num_peers: 1
          - afi: "ipv4"
            safi: "unicast"
            vrf: "default"
            num_peers: 3
        filters:
          tags: ["border"]
