   trunk group MLAG
!
vlan 4094
   name MLAG
   trunk group MLAG
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf default
      no shutdown
!
aaa authorization exec default local
!
interface Port-Channel1
   description MLAG_s2-brdr2_Port-Channel1
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description MLAG_s2-brdr2_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description P2P_s2-spine1_Ethernet7
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.2.17/31
!
interface Ethernet3
   description P2P_s2-spine2_Ethernet7
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.2.19/31
!
interface Ethernet4
   description P2P_s1-brdr1_Ethernet4
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.255.1/31
!
interface Ethernet6
   description MLAG_s2-brdr2_Ethernet6
   no shutdown
   channel-group 1 mode active
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.250.2.7/32
!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   no shutdown
   ip address 10.255.2.7/32
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.200/24
!
interface Vlan4093
   description MLAG_L3
   no shutdown
   mtu 1500
   ip address 10.252.2.8/31
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1500
   no autostate
   ip address 10.251.2.8/31
!
interface Vxlan1
   description s2-brdr1_VTEP
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
!
ip virtual-router mac-address 00:1c:73:00:00:99
!
ip routing
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.250.2.0/24 eq 32
   seq 20 permit 10.255.2.0/24 eq 32
!
mlag configuration
   domain-id S2_BRDR
   local-interface Vlan4094
   peer-address 10.251.2.9
   peer-link Port-Channel1
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ip route 0.0.0.0/0 192.168.0.1
!
ntp local-interface Management0
ntp server 192.168.0.1 prefer iburst
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
route-map RM-MLAG-PEER-IN permit 10
   description Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
   set origin incomplete
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
