!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   ip address 10.255.2.5/32
!
interface Management0
   description OOB_MANAGEMENT
   ip address 192.168.0.25/24
!
interface Vlan4093
   description MLAG_L3
   mtu 1500
   ip address 10.252.2.5/31
!
interface Vlan4094
   description MLAG
   mtu 1500
   no autostate
   ip address 10.251.2.5/31
